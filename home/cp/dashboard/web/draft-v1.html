<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>CP Dashboard — DRAFT v1（実データ）</title>
<style>
  :root{
    /* T-16 OLED VOID（2026-07-04 採用方向） */
    --bg:#000;--ink:#f2f2f5;--dim:#5a5a60;--faint:#38383e;
    --amber:#ffdf8a;--green:#8affc1;--cyan:#8ad8ff;--red:#ff8a8a;
    --brown:#c8a068;--gray:#9a9aa2;--line:#161618;
    --mono:"SF Mono","JetBrains Mono",Menlo,monospace}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{background:var(--bg);color:var(--ink);font-family:var(--mono);overflow:hidden;font-variant-numeric:tabular-nums}
  #board{position:relative;width:100vw;height:100vh}
  #board::before{content:'';position:absolute;left:0;top:0;bottom:0;width:1px;z-index:5;
    background:linear-gradient(180deg,rgba(255,255,255,.22),transparent 70%)}

  .p{position:absolute;padding:1.1vh .85vw;display:flex;flex-direction:column;gap:.5vh;overflow:hidden;
    background:transparent;border:1px solid var(--line);border-radius:6px}
  .p.rail{background:transparent;border:none;border-bottom:1px solid var(--line);border-radius:0;padding-left:1.1vw}

  .tag{align-self:flex-start;border:none;padding:.1vh 0;font-size:1.05vh;
    letter-spacing:.3vw;color:#4c4c54;background:transparent;white-space:nowrap}
  .lbl{font-size:1.05vh;letter-spacing:.2vw;color:var(--dim);white-space:nowrap}

  .hero{font-size:4.6vh;font-weight:bold;line-height:1}
  .big{font-size:2.9vh;font-weight:bold;line-height:1.05}
  .mid{font-size:1.9vh;font-weight:bold}
  .sml{font-size:1.45vh}.xs{font-size:1.1vh}
  .g{color:var(--green)}.c{color:var(--cyan)}.a{color:var(--amber)}.r{color:var(--red)}
  .d{color:var(--dim)}.br{color:var(--brown)}.gy{color:var(--gray)}
  .glow-a{text-shadow:0 0 16px rgba(227,179,65,.55)}
  .glow-g{text-shadow:0 0 16px rgba(126,231,135,.5)}
  .pulse{animation:pu 2.4s infinite}@keyframes pu{0%,100%{opacity:1}50%{opacity:.45}}
  /* 変化の顕在性: データが変わったパネルが光る（hot=5分以内 / soft=15分以内） */
  .p.chg{border-color:rgba(126,231,135,.35)}
  .p.chg::after{content:'';position:absolute;inset:0;pointer-events:none;border-radius:4px;
    box-shadow:inset 0 0 28px rgba(126,231,135,.06)}
  .p.chg-hot{border-color:rgba(126,231,135,.8);box-shadow:0 0 18px rgba(126,231,135,.18)}
  .p.chg-hot .tag{color:var(--green);border-color:rgba(126,231,135,.6)}
  .p.rail.chg{border-bottom-color:rgba(126,231,135,.4);background:linear-gradient(90deg,rgba(126,231,135,.06),transparent 70%)}
  .fill{flex:1;min-height:0}
  .row{display:flex;align-items:center;gap:.6vw}
  svg{display:block;width:100%;height:100%}
  svg text{font-family:var(--mono)}
</style>
</head>
<body>
<div id="board"></div>
<script src="draft-data.js"></script>
<script>
'use strict';
const D = window.DRAFT;
const GX = 48, GY = 27;

const LAYOUT = [
  {id:'boss',       x:0, y:0, w:9, h:3},
  {id:'records',    x:9, y:0, w:9, h:3},
  {id:'timealpha',  x:18,y:0, w:9, h:3},
  {id:'streakmini', x:27,y:0, w:21,h:3},
  {id:'acshower',   x:0, y:3, w:9, h:3, rail:1},
  {id:'weekband',   x:0, y:6, w:9, h:3, rail:1},
  {id:'perfhist',   x:0, y:9, w:9, h:3, rail:1},
  {id:'lastsub',    x:0, y:12,w:9, h:3, rail:1},
  {id:'fresh',      x:0, y:15,w:9, h:3, rail:1},
  {id:'race',       x:0, y:18,w:9, h:3, rail:1},
  {id:'weekdelta',  x:0, y:21,w:9, h:3, rail:1},
  {id:'stairs',     x:0, y:24,w:9, h:3, rail:1},
  {id:'stopwatch',  x:9, y:3, w:13,h:8},
  {id:'player',     x:22,y:3, w:13,h:8},
  {id:'difflog',    x:35,y:3, w:13,h:8},
  {id:'novitopics', x:9, y:11,w:23,h:16},
  {id:'streakfull', x:32,y:11,w:16,h:16},
];

const esc = s => String(s).replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
const fmtAge = m => m == null ? '?' : m < 60 ? m + 'm' : m < 1440 ? Math.floor(m/60) + 'h' : Math.floor(m/1440) + 'd';
const NCOL = {ac:'#2ea043', ac_with_editorial:'#c08a1e', wa:'#f47067', ns:'#222c3d'};

function countdown(e){
  let s = Math.max(0, e - Math.floor(Date.now()/1000));
  const d = Math.floor(s/86400); s -= d*86400;
  const h = Math.floor(s/3600);  s -= h*3600;
  const m = Math.floor(s/60);
  return `${d}d ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

const R = {};

/* ============ 上段 ============ */
R.boss = () => !D.next_abc
  ? `<span class="tag">BOSS FIGHT</span><span class="mid d">no upcoming ABC</span>`
  : `<span class="tag">BOSS FIGHT ⚔ ${esc(D.next_abc.id.toUpperCase())}</span>
     <div class="big a glow-a" id="cd">${countdown(D.next_abc.e)}</div>`;

R.records = () => `
  <span class="tag">RECORDS</span>
  <div class="row sml">🏆 <b class="c">${D.records.max_diff}</b><span class="xs d">diff</span>
    <span style="margin-left:.8vw">🔥</span> <b class="a">${D.records.max_streak}</b><span class="xs d">d best · now ${D.hud.streak}</span></div>`;

R.timealpha = () => {
  const mx = Math.max(...D.hours.map(h => h.t), 1);
  let best = {p: 0, h: null};
  for(let h = 0; h < 22; h++){
    const t = D.hours[h].t + D.hours[h+1].t + D.hours[h+2].t;
    const a = D.hours[h].a + D.hours[h+1].a + D.hours[h+2].a;
    if(t >= 6 && a/t > best.p) best = {p: a/t, h};
  }
  const bars = D.hours.map((h,i) => {
    const inPeak = best.h != null && i >= best.h && i < best.h + 3;
    const col = h.t === 0 ? '#141b28' : inPeak ? '#2ea043' : '#33404f';
    return `<rect x="${i*4.2}" y="${26-24*h.t/mx}" width="3.3" height="${24*h.t/mx}" rx="1" fill="${col}"/>`;
  }).join('');
  // 現在時刻の点線縦線（1日を左→右に横断）。ライブ層では下の setInterval が動かす。
  const now = new Date();
  const nowX = (now.getHours() + now.getMinutes() / 60) * 4.2;
  // 横軸の時刻ラベル（0/6/12/18/24 時）。棒と同じ 4.2/h スケールで配置。
  const axis = [0, 6, 12, 18, 24].map(h =>
    `<span style="position:absolute;left:${Math.min(h * 4.2 / 1.01, 100)}%;transform:translateX(-50%)">${h}</span>`).join('');
  return `<span class="tag">HOURS <span style="color:var(--faint);letter-spacing:.05vw">${best.h != null ? `peak ${best.h}–${best.h+3}h ${(best.p*100).toFixed(0)}%` : 'n<6'}</span></span>
    <div class="fill"><svg viewBox="0 0 101 27" preserveAspectRatio="none">${bars}<line id="hours-now" x1="${nowX}" y1="0" x2="${nowX}" y2="27" stroke="var(--cyan)" stroke-width=".6" stroke-dasharray="1.4 1.6" opacity=".9"/></svg></div>
    <span class="xs d" style="position:relative;display:block;height:1.3vh">${axis}</span>`;
};

R.streakmini = () => {
  const cells = D.cal.slice(-14).map(c => {
    const col = c.n === 0 ? '#161d2a' : c.m >= 800 ? '#2ea043' : c.m >= 400 ? '#c08552' : '#8b97a8';
    return `<i style="flex:1;aspect-ratio:1;border-radius:.35vh;background:${col}"></i>`;
  }).join('');
  const t = D.novi.totals, done = t.ac + t.ed, total = done + t.wa + t.ns;
  const fireCol = D.hud.streak === 0 ? 'var(--red)' : '#ff9f43';
  return `<div class="row" style="height:100%">
    <span class="tag">KEEP</span>
    <span class="mid" style="color:${fireCol}">🔥 ${D.hud.streak}</span><span class="xs d">/${D.hud.max_streak}</span>
    <div style="display:flex;gap:.18vw;flex:1.1;align-items:center">${cells}</div>
    <span class="xs d" style="letter-spacing:.15vw">NOVI</span>
    <div style="flex:1;height:1vh;background:#141b28;border-radius:.5vh;overflow:hidden">
      <div style="width:${(100*done/total).toFixed(0)}%;height:100%;background:linear-gradient(90deg,#1f7a33,#7ee787)"></div></div>
    <span class="sml g">${done}<span class="xs d">/${total}</span></span>
  </div>`;
};

/* ============ 左レール ============ */
R.acshower = () => {
  const l = D.last_sub;
  if(l && l.res === 'AC' && l.age_min < 15)
    return `<span class="lbl">SHOWER</span><div class="mid g glow-g pulse">✦ AC ${esc(l.pid)}</div>`;
  return `<span class="lbl">SHOWER</span><div class="sml" style="color:#2c3748">—</div>
    <div class="xs" style="color:var(--faint);letter-spacing:.2vw">STANDBY</div>`;
};

R.weekband = () => {
  const dl = new Date(D.deadline + 'T00:00:00');
  const wks = Math.ceil((dl - Date.now()) / 604800000);
  let cells = '';
  for(let i = 0; i < wks; i++){
    const cur = i === 0, last = i === wks - 1;
    cells += `<span class="${cur?'pulse':''}" style="flex:1;height:1.3vh;border-radius:.2vh;
      background:${cur ? 'rgba(86,212,221,.35)' : 'rgba(20,27,40,.9)'};
      ${last ? 'box-shadow:inset 0 0 0 1px var(--red)' : ''}"></span>`;
  }
  return `<span class="lbl">AMMO <b class="a" style="letter-spacing:0">${D.ammo}</b> → 8/19</span>
    <div class="row fill" style="gap:.22vw">${cells}</div>`;
};

R.perfhist = () => {
  const ps = D.perfs;
  const lo = -900, hi = 1400, bw = 200, nb = Math.ceil((hi-lo)/bw);
  const bins = {};
  ps.forEach(p => { const b = Math.floor((Math.max(lo,Math.min(hi,p))-lo)/bw); bins[b]=(bins[b]||0)+1; });
  const mx = Math.max(...Object.values(bins), 1);
  let bars = '';
  for(let b = 0; b < nb; b++){
    const v = bins[b]||0, cx = lo + b*bw + bw/2;
    const col = cx < 400 ? '#3a4657' : cx < 800 ? '#7a5c33' : '#2d5a3d';
    bars += `<rect x="${(b/nb)*150+2}" y="${30-27*v/mx}" width="${150/nb-2.5}" height="${27*v/mx}" rx="1.2" fill="${col}"/>`;
  }
  const x12 = ((1200-lo)/(hi-lo))*150;
  return `<span class="lbl">PERF DIST <span style="color:var(--faint)">n=${ps.length}</span></span>
    <div class="fill"><svg viewBox="0 0 160 32" preserveAspectRatio="none">${bars}
      <line x1="${x12}" y1="1" x2="${x12}" y2="31" stroke="var(--cyan)" stroke-dasharray="3 2" opacity=".8"/>
      <text x="${x12+3}" y="8" fill="var(--cyan)" font-size="7">1200</text></svg></div>`;
};

R.lastsub = () => {
  const l = D.last_sub;
  if(!l) return `<span class="lbl">LAST SUB</span><span class="sml d">—</span>`;
  const ok = l.res === 'AC';
  return `<span class="lbl">LAST SUB</span>
    <div class="sml"><span class="${ok?'g':'r'}">${esc(l.res)}</span> ${esc(l.pid)}
    <span class="xs d">· ${fmtAge(l.age_min)}</span></div>`;
};

R.fresh = () => {
  const f = D.fresh;
  const noviBad = f.novi_cookie_expired || (f.novi_min != null && f.novi_min > 2880);
  const dot = bad => `<span style="color:${bad?'var(--red)':'#2ea043'}">●</span>`;
  return `<span class="lbl">FEEDS</span>
    <div class="xs" style="line-height:1.9">${dot(false)} kenkoooo <span class="d">${fmtAge(f.kenkoooo_min)}</span>
    　${dot(false)} rating <span class="d">${fmtAge(f.rating_min)}</span><br>
    ${dot(noviBad)} novisteps <span class="${noviBad?'r':'d'}">${fmtAge(f.novi_min)}${f.novi_cookie_expired?' cookie ✕':''}</span></div>`;
};

R.race = () => {
  const rows = D.race.filter(r => r.self || r.ghost || r.ac > 0).slice(0, 3);
  const mx = Math.max(...rows.map(r => r.ac), 1);
  return `<span class="lbl">WEEK RACE</span>` + rows.map(r => `
    <div class="row" style="gap:.4vw">
      <span class="xs ${r.self?'g':'d'}" style="width:4.2vw;overflow:hidden">${esc(r.name)}</span>
      <div style="flex:1;height:.7vh;background:#121926;border-radius:.35vh;overflow:hidden">
        <div style="width:${(100*r.ac/mx).toFixed(0)}%;height:100%;background:${r.self?'var(--green)':r.ghost?'#4a4028':'#2e3a4c'}"></div></div>
      <span class="xs ${r.self?'g':'d'}">${r.ac}</span></div>`).join('');
};

R.weekdelta = () => {
  const t = D.week.this, l = D.week.last;
  const arrow = (a,b) => a >= b ? `<span class="g">▲</span>` : `<span class="r">▼</span>`;
  return `<span class="lbl">WEEK Δ</span>
    <div class="row sml" style="gap:1vw">
      <span>AC <b class="${t.ac>=l.ac?'g':'r'}">${t.ac}</b><span class="xs d">/${l.ac}</span> ${arrow(t.ac,l.ac)}</span>
      <span>Σdiff <b class="${t.dsum>=l.dsum?'g':'r'}">${t.dsum}</b><span class="xs d">/${l.dsum}</span> ${arrow(t.dsum,l.dsum)}</span>
    </div>`;
};

/* 全 rated ユーザーの rating 分布 — AtCoder 公式チャートの近似スナップショット（本実装では ranking から定期取得に置換） */
const POP = (() => {
  const seg = (lo, ns, col) => ns.map((n, i) => [lo + i*100, lo + (i+1)*100, n, col]);
  return [
    ...[[0,2,10700],[2,4,6300],[4,7,3000],[7,12,3850],[12,19,3450],[19,32,4000],
        [32,54,4500],[54,89,4750],[89,147,4900],[147,242,4800],[242,400,4400]]
      .map(b => [...b, '#4a5568']),
    ...seg(400,  [2600,2350,2100,1900], '#a06a3a'),
    ...seg(800,  [1750,1500,1300,1100], '#3f9f4f'),
    ...seg(1200, [1050,850,700,550],    '#3fbfbf'),
    ...seg(1600, [550,400,300,230],     '#4169e1'),
    ...seg(2000, [350,150,110,80],      '#b8b000'),
    ...seg(2400, [90,45,30,20],         '#e07820'),
    ...seg(2800, [15,8,5,3,2,1,1,1],    '#e04040'),
  ];
})();
R.stairs = () => {
  const r = D.hud.rating;
  const total = POP.reduce((a, b) => a + b[2], 0);
  let below = 0, pos = 0;
  POP.forEach((b, i) => {
    if(b[1] <= r) below += b[2];
    else if(b[0] <= r){ const f = (r - b[0]) / (b[1] - b[0]); below += b[2] * f; pos = i + f; }
  });
  const top = Math.max(1, Math.round(100 * (1 - below / total)));
  const mxN = Math.max(...POP.map(b => b[2]));
  const bw = 200 / POP.length;
  const bars = POP.map((b, i) =>
    `<rect x="${(i*bw + .4).toFixed(1)}" y="${(38 - 34*b[2]/mxN).toFixed(1)}" width="${(bw - .8).toFixed(1)}"
      height="${(34*b[2]/mxN).toFixed(1)}" fill="${b[3]}" opacity="${b[1] <= r ? .95 : .4}"/>`).join('');
  const mx = pos * bw;
  return `<span class="lbl">POPULATION <span style="color:var(--faint)">you = top ${top}%</span></span>
    <div class="fill"><svg viewBox="0 0 200 40" preserveAspectRatio="none">${bars}
      <line x1="${mx.toFixed(1)}" y1="0" x2="${mx.toFixed(1)}" y2="40" stroke="#e8f0f8" stroke-width=".7"/>
      <text x="${(mx + 3).toFixed(1)}" y="9" fill="var(--green)" font-size="9">${r}</text></svg></div>`;
};

/* ============ 中段 3枚 ============ */
R.player = () => {
  const rh = D.rhist;
  const last = rh[rh.length-1];
  const e0 = rh[0].e, e1 = last.e, yM = 450;
  const px = e => 6 + 168 * (e - e0) / Math.max(1, e1 - e0);
  const py = r => 62 - 54 * r / yM;
  const pts = rh.map(p => `${px(p.e).toFixed(1)},${py(p.r).toFixed(1)}`).join(' ');
  const area = `6,${py(0)} ${pts} ${px(e1).toFixed(1)},${py(0)}`;
  const proj = D.pace_week > 0
    ? `<line x1="${px(e1)}" y1="${py(last.r)}" x2="196" y2="${py(last.r + D.pace_week*10)}" stroke="var(--green)" stroke-dasharray="3 3" opacity=".55"/>` : '';
  const grid = [100,200,300,400].map(v =>
    `<line x1="6" y1="${py(v)}" x2="196" y2="${py(v)}" stroke="#131a26"/>` +
    (v === 400 ? `<text x="186" y="${py(v)-2}" fill="var(--brown)" font-size="7">400</text>` : '')).join('');
  const pd = D.perf_delta;
  return `<span class="tag">PLAYER</span>
    <div class="row" style="gap:1.2vw">
      <span class="big gy">${D.hud.rating}</span>
      <span class="sml"><span class="d">PERF</span> <b class="${pd>=0?'g':'r'}">${pd>=0?'+':''}${pd}</b> <span class="xs d">vs 5avg</span></span>
      <span class="sml"><span class="d">AMMO</span> <b class="a">${D.ammo}</b></span>
    </div>
    <div class="fill"><svg viewBox="0 0 200 66" preserveAspectRatio="none">
      <defs><linearGradient id="ga" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="rgba(126,231,135,.28)"/><stop offset="100%" stop-color="rgba(126,231,135,0)"/></linearGradient></defs>
      ${grid}
      <line x1="6" y1="${py(400)}" x2="196" y2="${py(400)}" stroke="#7a5c33" stroke-width=".8"/>
      <polygon points="${area}" fill="url(#ga)"/>
      <polyline points="${pts}" fill="none" stroke="var(--green)" stroke-width="1.6"/>
      ${proj}
      <circle cx="${px(e1)}" cy="${py(last.r)}" r="2.4" fill="var(--green)"/>
      <text x="${px(e1)-14}" y="${py(last.r)-5}" fill="var(--green)" font-size="8">${last.r}</text>
    </svg></div>
    <span class="xs d">+${D.pace_week}/wk · proj 10wk ⤳</span>`;
};

R.difflog = () => {
  const ps = D.dpoints;
  if(!ps.length) return `<span class="tag">DIFFICULTY</span><span class="sml d">no first-AC in 90d</span>`;
  const yM = Math.max(800, ...ps.map(p => p.d)) * 1.08;
  const e0 = ps[0].e, e1 = ps[ps.length-1].e;
  const px = e => 6 + 180 * (e - e0) / Math.max(1, e1 - e0);
  const py = d => 60 - 52 * d / yM;
  // trend
  const n = ps.length;
  const xs = ps.map(p => (p.e-e0)/86400), ysv = ps.map(p => p.d);
  const xm = xs.reduce((a,b)=>a+b,0)/n, ym = ysv.reduce((a,b)=>a+b,0)/n;
  let num = 0, den = 0;
  xs.forEach((x,i) => { num += (x-xm)*(ysv[i]-ym); den += (x-xm)**2; });
  const slope = den ? num/den : 0, b0 = ym - slope*xm;
  const tx1 = py(Math.max(0, b0)), tx2 = py(Math.max(0, b0 + slope*xs[n-1]));
  const dots = ps.map((p,i) => {
    const col = p.d >= 800 ? 'var(--green)' : p.d >= 400 ? 'var(--brown)' : '#7d8aa0';
    const lastDot = i === n-1;
    return `<circle cx="${px(p.e).toFixed(1)}" cy="${py(p.d).toFixed(1)}" r="${lastDot?2.6:1.7}" fill="${col}" ${lastDot?'class="pulse"':''} opacity=".92"/>`;
  }).join('');
  return `<span class="tag">DIFFICULTY <span style="letter-spacing:0;color:var(--faint)">90d · n=${n}</span></span>
    <div class="fill"><svg viewBox="0 0 200 64" preserveAspectRatio="none">
      <line x1="6" y1="${py(400)}" x2="194" y2="${py(400)}" stroke="#2a3040"/>
      <line x1="6" y1="${py(800)}" x2="194" y2="${py(800)}" stroke="#1c2634"/>
      <text x="184" y="${py(400)-2}" fill="var(--brown)" font-size="7">400</text>
      <text x="184" y="${py(800)-2}" fill="var(--green)" font-size="7">800</text>
      <line x1="${px(e0)}" y1="${tx1}" x2="${px(e1)}" y2="${tx2}" stroke="var(--cyan)" stroke-dasharray="4 3" opacity=".6"/>
      ${dots}</svg></div>
    <span class="xs ${slope>0?'c':'d'}">trend ${slope>=0?'+':''}${(slope*7).toFixed(0)}/wk ${slope>0?'↗':'→'}</span>`;
};

R.novieta = () => {
  const t = D.novi.totals, done = t.ac + t.ed, total = done + t.wa + t.ns;
  const seg = (v, col) => total ? `<div style="width:${(100*v/total)}%;background:${col};height:100%"></div>` : '';
  const wk = D.week.this.ac || 0;
  return `<span class="tag">NOVI STOCK</span>
    <div class="row" style="align-items:baseline;gap:.6vw">
      <span class="hero c" style="font-size:3.6vh">${t.ns}</span>
      <span class="sml d">left · ${done}/${total} done</span></div>
    <div style="display:flex;height:1.6vh;border-radius:.8vh;overflow:hidden;background:#121926">
      ${seg(t.ac,'#2ea043')}${seg(t.ed,'#c08a1e')}${seg(t.wa,'#f47067')}</div>
    <div class="xs d"><span class="g">■</span> ${t.ac}　<span class="a">■</span> ${t.ed}　<span class="r">■</span> ${t.wa}</div>
    <div class="fill"></div>
    <span class="xs ${wk ? 'd' : 'a'}">${wk ? `pace ${wk}/wk → ETA ~${Math.ceil(t.ns/wk)}wk` : 'pace 0/wk → ETA —'}</span>`;
};

/* ============ 中央 ============ */
/* 実測 solve-time baseline。gen-draft-data.py が seed(x1nano 288)+live から grade 別に
   Q1/med/Q3/四分位偏差(qd)/mean/max を算出（分）。running 時はこの基準線が生きたゲージになる。
   D.solveRef が無い場合のみ旧ハードコードにフォールバック。 */
const _SR = D.solveRef || {grades:[], n_total:0};
const SOLVE_REF = _SR.grades.length ? _SR.grades : [
  {g:'Q3', n:0, q1:11, med:30, q3:45, qd:17, mean:54, max:193},
  {g:'Q4', n:0, q1:13, med:28, q3:60, qd:24, mean:52, max:233},
  {g:'Q5', n:0, q1:6,  med:8,  q3:13, qd:4,  mean:26, max:137},
];
const SW_CAP = 240;                                        // 4h（分）
const swPx = m => Math.sqrt(Math.min(m, SW_CAP)/SW_CAP)*100;    // sqrt スケール（短時間側を広く）
const fmtHMS = s => {
  s = Math.max(0, Math.floor(s));
  return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s/60)%60).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
};
R.stopwatch = () => {
  const px = swPx;
  const fm = m => m < 60 ? Math.round(m)+'m' : Math.floor(m/60)+'h'+(m%60 ? String(Math.round(m%60)).padStart(2,'0') : '');
  const sw = D.stopwatch;                                  // null | {status,task_id,grade,start,elapsed,judging,submitted_at,wa_at,tested_at}
  const running = sw && sw.status === 'running';
  const judging = running && sw.judging && sw.submitted_at; // 仮停止＝提出時刻で止めて見せる
  const frozen  = sw && sw.status === 'frozen';
  const elapS   = frozen ? sw.elapsed
                : judging ? sw.submitted_at - sw.start
                : running ? Math.floor(Date.now()/1000) - sw.start : 0;
  const elapM   = elapS / 60;
  const rows = SOLVE_REF.map(r => {
    const hot = sw && sw.grade === r.g;
    const gauge = hot && running
      ? `<div id="sw-gauge" style="position:absolute;left:0;top:0;height:100%;width:${px(elapM)}%;border-radius:.75vh;
           background:linear-gradient(90deg,rgba(57,208,216,.25),rgba(57,208,216,.55))"></div>
         <div id="sw-head" style="position:absolute;left:${px(elapM)}%;top:-30%;width:2px;height:160%;background:var(--cyan)"></div>`
      : hot && frozen
      ? `<div style="position:absolute;left:0;top:0;height:100%;width:${px(elapM)}%;border-radius:.75vh;
           background:linear-gradient(90deg,rgba(57,208,216,.2),rgba(57,208,216,.4))"></div>
         <div style="position:absolute;left:${px(elapM)}%;top:-30%;width:2px;height:160%;background:var(--cyan)"></div>`
      : '';
    // 箱ひげ風: Q1–Q3 の四分位箱＋median 線＋mean 線＋max ひげ。箱幅=IQR、その半分=四分位偏差。
    const boxL = px(r.q1), boxW = Math.max(px(r.q3) - px(r.q1), 0.6);
    return `
    <div class="row" style="gap:.7vw">
      <span class="sml ${hot ? 'c' : 'gy'}" style="width:3.2vw">${r.g}${hot ? ' ◀' : ''}<span class="d" style="font-size:1vh"> ${r.n||'–'}</span></span>
      <div style="flex:1;position:relative;height:1.5vh;background:#0e1420;border-radius:.75vh">
        <div style="position:absolute;left:${boxL}%;width:${boxW}%;top:10%;height:80%;border-radius:.35vh;
          background:linear-gradient(90deg,rgba(126,231,135,.12),rgba(126,231,135,.26));box-shadow:inset 0 0 0 1px rgba(126,231,135,.30)"></div>
        ${gauge}
        <div style="position:absolute;left:${px(r.med)}%;top:-22%;width:2px;height:144%;background:var(--green)"></div>
        <div style="position:absolute;left:${px(r.mean)}%;top:-6%;width:2px;height:112%;background:var(--amber);opacity:.85"></div>
        <div style="position:absolute;left:${px(r.max)}%;top:24%;width:1.5px;height:52%;background:var(--red);opacity:.55"></div>
      </div>
      <span class="xs" style="width:9vw;white-space:nowrap"><span class="g">${fm(r.med)}</span><span class="d">·</span><span class="a">${fm(r.mean)}</span> <span class="c">±${fm(r.qd)}</span><span class="d">·</span><span class="r" style="opacity:.7">${fm(r.max)}</span></span>
    </div>`;
  }).join('');
  const ref = sw && SOLVE_REF.find(r => r.g === sw.grade);
  const vs = frozen && ref
    ? `<span class="xs ${elapM <= ref.med ? 'g' : elapM <= ref.mean ? 'a' : 'r'}" style="margin-left:auto">vs ${esc(sw.grade)} med ${fm(ref.med)} ${elapM <= ref.med ? '▼' : '▲'}${fm(Math.abs(elapM - ref.med))}</span>`
    : '';
  const nowS = Math.floor(Date.now()/1000);
  const tested = running && sw.tested_at && nowS - sw.tested_at < 600
    ? `<span class="xs g">✓ tests</span>` : '';
  const waNote = running && sw.wa_at
    ? `<span class="xs r">WA ${fmtHMS(sw.wa_at - sw.start)}</span>` : '';
  const head = judging
    ? `<span class="a pulse" style="font-size:1.2vh">⏳</span><span class="xs" style="letter-spacing:.2vw;color:var(--amber)">${esc(sw.task_id)} · JUDGING</span>
       <div class="big a" style="font-size:2.8vh">${fmtHMS(elapS)}</div>
       ${waNote}<span class="xs" style="margin-left:auto;color:var(--faint)">AC→■ WA→▶</span>`
    : running
    ? `<span class="c pulse" style="font-size:1.2vh">▶</span><span class="xs" style="letter-spacing:.2vw;color:var(--cyan)">${esc(sw.task_id)}${sw.grade ? ' · '+esc(sw.grade) : ''}</span>
       <div class="big c" id="sw-clock" style="font-size:2.8vh">${fmtHMS(elapS)}</div>
       ${tested}${waNote}<span class="xs" style="margin-left:auto;color:var(--faint)">AC→■</span>`
    : frozen
    ? `<span class="g" style="font-size:1.2vh">■</span><span class="xs" style="letter-spacing:.2vw;color:var(--green)">AC · ${esc(sw.task_id)}</span>
       <div class="big g" style="font-size:2.8vh">${fmtHMS(elapS)}</div>
       ${vs}`
    : `<span class="g pulse" style="font-size:1.2vh">●</span><span class="xs" style="letter-spacing:.2vw;color:var(--green)">READY</span>
       <div class="big" style="color:#26314a;font-size:2.8vh">00:00:00</div>
       <span class="xs" style="margin-left:auto;color:var(--faint)">oj→▶ AC→■</span>`;
  return `
  <span class="tag">SOLVE STOPWATCH</span>
  <div class="row" style="gap:.8vw">${head}</div>
  <div class="fill" style="display:flex;flex-direction:column;justify-content:center;gap:1vh">
    <span class="lbl">SELF BASELINE · n=${_SR.n_total||288}　<span class="g">▎med</span> <span class="a">▎mean</span> <span style="color:rgba(126,231,135,.5)">▨IQR</span> <span class="c">±QD</span> <span class="r" style="opacity:.7">▏max</span></span>
    ${rows}
    <div class="row xs" style="color:var(--faint);gap:0">
      <span style="width:3.2vw"></span>
      <span style="flex:1;position:relative"><span>0</span><span style="position:absolute;left:${px(30)}%">30m</span><span style="position:absolute;left:${px(60)}%">1h</span><span style="position:absolute;left:${px(120)}%">2h</span><span style="position:absolute;right:0">4h cap</span></span>
      <span style="width:9vw"></span>
    </div>
  </div>
  <span class="xs" style="color:var(--faint)">open → first AC · WA keeps running</span>`;
};

R.novitopics = () => {
  const t = D.novi.totals, done = t.ac + t.ed, total = done + t.wa + t.ns;
  const rows = D.novi.topics.map(tp => {
    const cells = tp.grades.map(([gn, d, tt, w]) => {
      const pct = Math.round(100 * d / tt);
      const bg = d === tt ? '#2ea043' : `linear-gradient(to top, #2ea043 ${pct}%, #1b2331 ${pct}%)`;
      const bd = w ? 'box-shadow:inset 0 0 0 1px #f47067;' : '';
      return `<i title="Q${gn} ${d}/${tt}" style="display:inline-block;width:1.2vh;height:1.2vh;border-radius:.22vh;background:${bg};${bd}"></i>`;
    }).join('');
    return `<div class="row" style="gap:.45vw;font-size:1.25vh;min-width:0">
      <span style="width:8.5vw;overflow:hidden;white-space:nowrap;color:${tp.active?'var(--amber)':'var(--ink)'}">${esc(tp.title)}${tp.active?' ◀':''}</span>
      <span style="display:flex;gap:.14vw">${cells}</span>
      <span class="d" style="margin-left:auto;font-size:1.1vh">${tp.done}<span style="color:var(--faint)">/${tp.total}</span></span></div>`;
  }).join('');
  return `<span class="tag">NOVISTEPS <span style="letter-spacing:.05vw;color:var(--faint)">${esc(D.novi.user||'')} · ${D.novi.topics.length} topics · cell=grade Q↓ · fill=done</span></span>
    <div class="xs"><b class="g">${t.ac}</b><span class="d">/</span><b class="a">${t.ed}</b><span class="d">/</span><b class="r">${t.wa}</b>
      <span class="d">· ${done}/${total} · </span><b class="c">${t.ns}</b><span class="d"> left</span>
      <span style="float:right;display:inline-flex;width:8vw;height:1vh;border-radius:.5vh;overflow:hidden;background:#121926;margin-top:.3vh">
        <span style="width:${(100*t.ac/total)}%;background:#2ea043"></span><span style="width:${(100*t.ed/total)}%;background:#c08a1e"></span><span style="width:${(100*t.wa/total)}%;background:#f47067"></span></span></div>
    <div class="fill" style="display:grid;grid-template-columns:1fr 1fr;grid-auto-flow:column;grid-template-rows:repeat(18,1fr);gap:.2vh 1.6vw;align-content:space-around">${rows}</div>`;
};

/* ============ 右カラム ============ */
R.streakfull = () => {
  const cal = D.cal;
  const weeks = Math.floor(cal.length / 7);
  let cells = '';
  for(let row = 0; row < 7; row++){
    for(let col = 0; col < weeks; col++){
      const c = cal[col*7 + row];
      if(!c) continue;
      const bg = c.n === 0 ? '#10151f' : c.m >= 800 ? '#2ea043' : c.m >= 400 ? '#c08552' : '#8b97a8';
      const isToday = col*7 + row === cal.length - 1;
      cells += `<rect x="${col*8.4}" y="${row*8.4}" width="7" height="7" rx="1.6" fill="${bg}"
        ${isToday ? 'stroke="var(--cyan)" stroke-width=".8"' : ''}/>`;
    }
  }
  const calVB = `0 0 ${weeks*8.4 - 1.4} 58`;
  const sc = D.scatter || [];
  const H = 100;
  const yh = h => 6 + h/24*(H-12);
  const morning = `<rect x="8" y="${yh(6)}" width="188" height="${yh(9)-yh(6)}" fill="rgba(126,231,135,.05)"/>`;
  const grid = [0,6,12,18,24].map(h =>
    `<line x1="8" y1="${yh(h)}" x2="196" y2="${yh(h)}" stroke="#131a26"/>
     <text x="0" y="${yh(h)+2}" fill="var(--faint)" font-size="6">${h}</text>`).join('');
  const ticks = [0,7,14,21,27].map(d => d === 27
    ? `<text x="196" y="${H-1}" fill="var(--faint)" font-size="6" text-anchor="end">now</text>`
    : `<text x="${(10+d/27*182).toFixed(0)}" y="${H-1}" fill="var(--faint)" font-size="6">-${27-d}d</text>`).join('');
  const dcol = d => d == null ? '#4a5568'
    : d >= 1600 ? '#67c3e8' : d >= 1200 ? '#56d4dd' : d >= 800 ? '#7ee787'
    : d >= 400 ? '#c08552' : '#8b97a8';
  const dots = sc.map(p => p.a
    ? `<circle cx="${(10 + p.x/27*182).toFixed(1)}" cy="${yh(p.h).toFixed(1)}" r="2.1"
        fill="${dcol(p.d)}" opacity=".92"/>`
    : `<circle cx="${(10 + p.x/27*182).toFixed(1)}" cy="${yh(p.h).toFixed(1)}" r="1.5"
        fill="none" stroke="var(--red)" stroke-width=".8" opacity=".55"/>`).join('');
  const fireCol = D.hud.streak === 0 ? 'var(--red)' : '#ff9f43';
  return `<span class="tag">STREAK <span style="letter-spacing:0;color:${fireCol}">🔥 ${D.hud.streak}</span><span style="letter-spacing:0;color:var(--faint)"> / best ${D.hud.max_streak}</span></span>
    <div style="height:31%"><svg viewBox="${calVB}" preserveAspectRatio="xMidYMid meet">${cells}</svg></div>
    <div class="fill"><svg viewBox="0 0 200 ${H}" preserveAspectRatio="none">${morning}${grid}${ticks}${dots}</svg></div>
    <span class="xs d">28d · AC <span class="gy">●</span><span class="br">●</span><span class="g">●</span><span class="c">●</span> by diff · <span class="r">◦</span> WA · 1st AC ${D.hud.first_ac_today || '—'}</span>`;
};

/* ---------- v1.1: 実寸で描き直す層（真円・正方形を保証） ---------- */
const dcolor = d => d == null ? '#4a5568'
  : d >= 1600 ? '#67c3e8' : d >= 1200 ? '#56d4dd' : d >= 800 ? '#7ee787'
  : d >= 400 ? '#c08552' : '#8b97a8';

R.difflog = () => `
  <span class="tag">DIFFICULTY <span style="letter-spacing:0;color:var(--faint)">90d · n=${(D.dpoints||[]).length}</span></span>
  <div class="fill" data-c="diff"></div>
  <span class="xs d" data-c="difftrend"></span>`;

R.streakfull = () => {
  const fireCol = D.hud.streak === 0 ? 'var(--red)' : '#ff9f43';
  return `<span class="tag">STREAK <span style="letter-spacing:0;color:${fireCol}">🔥 ${D.hud.streak}</span><span style="letter-spacing:0;color:var(--faint)"> / best ${D.hud.max_streak}</span></span>
    <div data-c="cal" style="height:30%"></div>
    <div class="fill" data-c="scat" style="margin-top:.6vh"></div>
    <span class="xs d">28d · AC <span class="gy">●</span><span class="br">●</span><span class="g">●</span><span class="c">●</span> by diff · <span class="r">◦</span> WA · 1st AC ${D.hud.first_ac_today || '—'}</span>`;
};

/* NOVISTEPS: 固定列 TOPIC×GRADE（列=級・セル内に d/t・塗り=消化率） */
R.novitopics = () => {
  const t = D.novi.totals, done = t.ac + t.ed, total = done + t.wa + t.ns;
  const gset = new Set();
  D.novi.topics.forEach(tp => tp.grades.forEach(g => gset.add(g[0])));
  const gcols = [...gset].sort((a, b) => b - a);            // Q大(易) → Q小(難)
  const gi = Object.fromEntries(gcols.map((g, i) => [g, i]));
  const NC = gcols.length;
  const half = Math.ceil(D.novi.topics.length / 2);
  // 行高・フォントは drawMeasured() が列の実高÷行数から算出し CSS 変数で流し込む
  // （--nc-ch=セル高 / --nc-fs=フォント）。トピック数がいくつでも実測でフィットして切れない。
  // 下のフォールバック値は初回描画（drawMeasured 実行前）用。
  const gridStyle = `display:grid;grid-template-columns:6.4vw repeat(${NC},1fr) 3vw;gap:.1vh .16vw;align-items:center;font-size:var(--nc-fs,.95vh)`;
  const head = `<div style="${gridStyle};color:var(--faint)">
    <span></span>${gcols.map(g => `<span style="text-align:center">Q${g}</span>`).join('')}<span></span></div>`;
  const row = tp => {
    const cells = tp.grades.map(([gn, a, e2, w, tt]) => {
      const pa = (100 * a / tt).toFixed(1), pe = (100 * (a + e2) / tt).toFixed(1), pw = (100 * (a + e2 + w) / tt).toFixed(1);
      const bg = `linear-gradient(to right,#2a8c3f 0% ${pa}%,#c08a1e ${pa}% ${pe}%,#c8493f ${pe}% ${pw}%,#161e2c ${pw}%)`;
      const dn = a + e2;
      const tc = dn === 0 && w === 0 ? '#42506a' : '#e8f0f4';
      return `<span title="Q${gn}: self ${a} · editorial ${e2} · trying ${w} · new ${tt - dn - w}"
        style="grid-column:${gi[gn] + 2};height:var(--nc-ch,1.5vh);border-radius:.2vh;background:${bg};
        display:flex;align-items:center;justify-content:center;font-size:.85em;color:${tc};text-shadow:0 0 3px rgba(0,0,0,.85)">${dn}/${tt}</span>`;
    }).join('');
    return `<div style="${gridStyle}">
      <span style="overflow:hidden;white-space:nowrap;color:${tp.active ? 'var(--amber)' : 'var(--ink)'}">${esc(tp.title)}</span>
      ${cells}
      <span style="grid-column:${NC + 2};font-size:.85em;text-align:right;color:var(--dim)">${tp.done}/${tp.total}</span></div>`;
  };
  const colHTML = list => head + list.map(row).join('');
  return `<span class="tag">NOVISTEPS <span style="letter-spacing:.05vw;color:var(--faint)">${esc(D.novi.user || '')} · ${D.novi.topics.length} topics</span></span>
    <div class="xs"><b class="g">${t.ac}</b><span class="d">/</span><b class="a">${t.ed}</b><span class="d">/</span><b class="r">${t.wa}</b>
      <span class="d">· ${done}/${total} · </span><b class="c">${t.ns}</b><span class="d"> left</span>
      <span style="float:right"><span class="g">■</span><span class="d"> self </span><span class="a">■</span><span class="d"> editorial </span><span class="r">■</span><span class="d"> trying</span></span></div>
    <div class="fill" style="display:grid;grid-template-columns:1fr 1fr;gap:0 1.4vw;align-content:stretch;overflow:hidden">
      <div data-nc="0" style="display:flex;flex-direction:column;gap:.1vh;justify-content:space-around;min-height:0;overflow:hidden">${colHTML(D.novi.topics.slice(0, half))}</div>
      <div data-nc="1" style="display:flex;flex-direction:column;gap:.1vh;justify-content:space-around;min-height:0;overflow:hidden">${colHTML(D.novi.topics.slice(half))}</div>
    </div>`;
};

function drawMeasured(){
  /* NOVISTEPS: 列の実高 ÷ 行数 でセル高・フォントを算出して流し込む＝トピック数が
     いくつでも実測でフィット（切れない）。resize でも再フィット。0.9 は行間ぶんの余裕。 */
  document.querySelectorAll('[data-nc]').forEach(col => {
    const n = col.children.length;                         // header + topic 行
    if(!n || !col.clientHeight) return;
    const per = col.clientHeight / n;                      // 1行あたりの実 px（列高÷行数）
    col.style.setProperty('--nc-ch', (per * 0.9).toFixed(1) + 'px');   // セル高＝行の9割（残りは行間+切れ防止）
    col.style.setProperty('--nc-fs', Math.max(7, Math.min(per * 0.56, 14)).toFixed(1) + 'px');
  });
  /* カレンダー: セルは常に正方形。枠幅に入るだけの週を末尾から表示 */
  const calBox = document.querySelector('[data-c="cal"]');
  if(calBox && calBox.clientWidth){
    const w = calBox.clientWidth, h = calBox.clientHeight;
    const pitch = h / 7;
    const weeks = Math.max(4, Math.floor(w / pitch));
    const days = D.cal.slice(-Math.min(weeks * 7, D.cal.length));
    const size = pitch * 0.8;
    const x0 = w - Math.ceil(days.length / 7) * pitch;
    let s = '';
    days.forEach((c, i) => {
      const col = Math.floor(i / 7), row = i % 7;
      const bg = c.n === 0 ? '#10151f' : c.m >= 800 ? '#2ea043' : c.m >= 400 ? '#c08552' : '#8b97a8';
      const last = i === days.length - 1;
      const cx = x0 + col * pitch + size / 2, cy = row * pitch + size / 2;
      s += `<circle cx="${cx.toFixed(1)}" cy="${cy.toFixed(1)}" r="${(size / 2).toFixed(1)}" fill="${bg}" ${last ? 'stroke="var(--cyan)" stroke-width="1.4"' : ''}/>`;
    });
    calBox.innerHTML = `<svg viewBox="0 0 ${w} ${h}">${s}</svg>`;
  }
  /* 時刻散布: ドットは常に真円（固定px半径） */
  const scBox = document.querySelector('[data-c="scat"]');
  if(scBox && scBox.clientWidth){
    const w = scBox.clientWidth, h = scBox.clientHeight;
    const mL = 18, mR = 6, mT = 4, mB = 13;
    const yh = hr => mT + (h - mT - mB) * hr / 24;
    const xd = d => mL + (w - mL - mR) * d / 27;
    let s = `<rect x="${mL}" y="${yh(6)}" width="${w - mL - mR}" height="${yh(9) - yh(6)}" fill="rgba(126,231,135,.05)"/>`;
    for(const gh of [0, 6, 12, 18, 24])
      s += `<line x1="${mL}" y1="${yh(gh)}" x2="${w - mR}" y2="${yh(gh)}" stroke="#131a26"/>
            <text x="0" y="${yh(gh) + 3}" fill="#31405a" font-size="10">${gh}</text>`;
    for(const d of [0, 7, 14, 21])
      s += `<text x="${xd(d)}" y="${h - 2}" fill="#31405a" font-size="10">-${27 - d}d</text>`;
    s += `<text x="${w - mR}" y="${h - 2}" fill="#31405a" font-size="10" text-anchor="end">now</text>`;
    for(const p of (D.scatter || []))
      s += p.a
        ? `<circle cx="${xd(p.x).toFixed(1)}" cy="${yh(p.h).toFixed(1)}" r="3.5" fill="${dcolor(p.d)}" opacity=".92"/>`
        : `<circle cx="${xd(p.x).toFixed(1)}" cy="${yh(p.h).toFixed(1)}" r="2.5" fill="none" stroke="var(--red)" stroke-width="1" opacity=".55"/>`;
    scBox.innerHTML = `<svg viewBox="0 0 ${w} ${h}">${s}</svg>`;
  }
  /* DIFFICULTY: 同じく実寸描画 */
  const dfBox = document.querySelector('[data-c="diff"]');
  if(dfBox && dfBox.clientWidth){
    const ps = D.dpoints || [];
    const w = dfBox.clientWidth, h = dfBox.clientHeight;
    if(ps.length){
      const yM = Math.max(800, ...ps.map(p => p.d)) * 1.08;
      const e0 = ps[0].e, e1 = ps[ps.length - 1].e;
      const X = e => 8 + (w - 20) * (e - e0) / Math.max(1, e1 - e0);
      const Y = d => (h - 6) - (h - 14) * d / yM;
      const n = ps.length;
      const xs = ps.map(p => (p.e - e0) / 86400), ys = ps.map(p => p.d);
      const xm = xs.reduce((a, b) => a + b, 0) / n, ym = ys.reduce((a, b) => a + b, 0) / n;
      let num = 0, den = 0;
      xs.forEach((x, i) => { num += (x - xm) * (ys[i] - ym); den += (x - xm) ** 2; });
      const slope = den ? num / den : 0, b0 = ym - slope * xm;
      let s = '';
      s += `<line x1="8" y1="${Y(400)}" x2="${w - 12}" y2="${Y(400)}" stroke="#2a3040"/>`;
      s += `<line x1="8" y1="${Y(800)}" x2="${w - 12}" y2="${Y(800)}" stroke="#1c2634"/>`;
      s += `<text x="${w - 36}" y="${Y(400) - 5}" fill="var(--brown)" font-size="11">400</text>`;
      s += `<text x="${w - 36}" y="${Y(800) - 5}" fill="var(--green)" font-size="11">800</text>`;
      s += `<line x1="${X(e0)}" y1="${Y(Math.max(0, b0))}" x2="${X(e1)}" y2="${Y(Math.max(0, b0 + slope * xs[n - 1]))}" stroke="var(--cyan)" stroke-dasharray="6 5" opacity=".6"/>`;
      ps.forEach((p, i) => {
        const col = p.d >= 800 ? 'var(--green)' : p.d >= 400 ? 'var(--brown)' : '#7d8aa0';
        s += `<circle cx="${X(p.e).toFixed(1)}" cy="${Y(p.d).toFixed(1)}" r="${i === n - 1 ? 4.5 : 3}" fill="${col}" ${i === n - 1 ? 'class="pulse"' : ''} opacity=".92"/>`;
      });
      dfBox.innerHTML = `<svg viewBox="0 0 ${w} ${h}">${s}</svg>`;
      const tr = document.querySelector('[data-c="difftrend"]');
      if(tr){
        tr.textContent = `trend ${slope >= 0 ? '+' : ''}${(slope * 7).toFixed(0)}/wk ${slope > 0 ? '↗' : '→'}`;
        tr.className = 'xs ' + (slope > 0 ? 'c' : 'd');
      }
    }
  }
}

/* ---------- 変化検知: パネル毎シグネチャを前回表示と比較 ---------- */
const SIG = {
  boss:       () => D.next_abc && D.next_abc.id,
  records:    () => [D.records.max_diff, D.records.max_streak],
  timealpha:  () => D.hours.reduce((a, h) => a + h.t, 0),
  streakmini: () => [D.hud.streak, D.cal[D.cal.length - 1]],
  streakfull: () => [D.hud.streak, D.cal[D.cal.length - 1], (D.scatter || []).length],
  acshower:   () => D.last_sub && D.last_sub.e,
  lastsub:    () => D.last_sub && D.last_sub.e,
  weekband:   () => D.ammo,
  perfhist:   () => D.perfs.length,
  fresh:      () => [D.fresh.novi_cookie_expired],
  race:       () => D.race.map(r => r.ac),
  weekdelta:  () => [D.week.this.ac, D.week.this.dsum],
  stairs:     () => D.hud.rating,
  player:     () => [D.hud.rating, D.perf_delta, D.ammo],
  difflog:    () => (D.dpoints || []).length,
  novitopics: () => [D.novi.totals.ac, D.novi.totals.ed, D.novi.totals.wa],
};
function applyChangeGlow(){
  let store = {};
  try{ store = JSON.parse(localStorage.getItem('cpdash-sig') || '{}'); }catch(e){}
  const now = Date.now();
  for(const it of LAYOUT){
    const f = SIG[it.id];
    if(!f) continue;
    const s = JSON.stringify(f() ?? null);
    const prev = store[it.id];
    const t = prev ? (prev.s !== s ? now : prev.t) : 0;
    store[it.id] = {s, t};
    const el = board.querySelector(`[data-id="${it.id}"]`);
    if(!el || !t) continue;
    const age = now - t;
    if(age < 15 * 60 * 1000){
      el.classList.add('chg');
      if(age < 5 * 60 * 1000) el.classList.add('chg-hot');
    }
  }
  localStorage.setItem('cpdash-sig', JSON.stringify(store));
}

/* ---------- mount ---------- */
const board = document.getElementById('board');
for(const it of LAYOUT){
  const el = document.createElement('div');
  el.className = 'p' + (it.rail ? ' rail' : '');
  el.dataset.id = it.id;
  el.style.left = (it.x/GX*100)+'%'; el.style.top = (it.y/GY*100)+'%';
  el.style.width = (it.w/GX*100)+'%'; el.style.height = (it.h/GY*100)+'%';
  el.innerHTML = (R[it.id] || (() => `<span class="lbl">${it.id}</span>`))();
  board.appendChild(el);
}
drawMeasured();
applyChangeGlow();
window.addEventListener('resize', drawMeasured);
if(D.next_abc){
  setInterval(() => {
    const cd = document.getElementById('cd');
    if(cd) cd.textContent = countdown(D.next_abc.e);
  }, 1000);
}
if(D.stopwatch && D.stopwatch.status === 'running'
   && !(D.stopwatch.judging && D.stopwatch.submitted_at)){   // JUDGING は仮停止＝秒針を止める
  setInterval(() => {
    const s = Math.floor(Date.now()/1000) - D.stopwatch.start;
    const clock = document.getElementById('sw-clock');
    if(clock) clock.textContent = fmtHMS(s);
    const w = swPx(s/60) + '%';
    const gauge = document.getElementById('sw-gauge');
    const head = document.getElementById('sw-head');
    if(gauge) gauge.style.width = w;
    if(head) head.style.left = w;
  }, 1000);
}
/* HOURS の現在時刻ライン: 30秒ごとに左→右へ進める（ライブ層のみ。壁紙はレンダ時点で静止） */
setInterval(() => {
  const el = document.getElementById('hours-now');
  if(!el) return;
  const n = new Date();
  const x = (n.getHours() + n.getMinutes()/60) * 4.2;
  el.setAttribute('x1', x); el.setAttribute('x2', x);
}, 30000);
</script>
